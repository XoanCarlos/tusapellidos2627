services:
  mysql:
    image: mysql:8
    container_name: mysql_dam
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: bbdd
      MYSQL_USER: user
      MYSQL_PASSWORD: abc123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin_dam
    environment:
      PMA_HOST: mysql  
      PMA_PORT: 3306
    ports:
      - "8080:80"
    depends_on:
      - mysql

volumes:
  mysql_data: